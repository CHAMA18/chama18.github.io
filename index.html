<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NDU Project - Navigate. Deliver. Upgrade.">

  <!-- Aggressive cache prevention — ensures users always see the latest version -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NDU Project">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png"/>

  <title>NDU Project</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
    .loading-container {
      text-align: center;
      color: #94a3b8;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(148, 163, 184, 0.2);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading NDU Project...</div>
  </div>
  <!-- Runtime environment config — loaded BEFORE Flutter so keys are
       available when EnvConfigLoader.load() runs in main(). -->
  <script src="env-config.js?v=1781009838"></script>
  <script src="flutter_bootstrap.js?v=1781009838" async></script>

  <!-- Hard refresh on stale service worker — detects version mismatch and force-reloads -->
  <script>
    (function() {
      var NDU_BUILD = '1781009838';
      try {
        var stored = localStorage.getItem('__ndu_build');
        if (stored && stored !== NDU_BUILD) {
          // Build changed — unregister old service worker and hard reload
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(reg) { reg.unregister(); });
            });
          }
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          }).then(function() {
            localStorage.setItem('__ndu_build', NDU_BUILD);
            location.reload(true);
          });
          return;
        }
        localStorage.setItem('__ndu_build', NDU_BUILD);
      } catch(e) {}
    })();
  </script>
</body>
</html>
